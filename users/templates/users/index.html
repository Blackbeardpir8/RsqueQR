<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueQR - User List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">RescueQR</a>
            <a href="{% url 'user_create' %}" class="btn btn-success">+ Add User</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-3">User List</h2>
        {% if users %}
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.first_name }} {{ user.last_name }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.phone_number }}</td>
                    <td>
                        <a href="{% url 'get-user' user.id %}" class="btn btn-info btn-sm">View</a>
                        <a href="{% url 'update-user' user.id %}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="{% url 'delete-user' user.id %}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p class="alert alert-warning">No users found. <a href="{% url 'user_create' %}" class="alert-link">Add one here</a>.</p>
        {% endif %}
    </div>
</body>
</html>
